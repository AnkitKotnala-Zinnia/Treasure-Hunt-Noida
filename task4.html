<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4 - Pride Treasure Hunt</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    
</head>
<body>
    <div class="container">
        <div class="task-header">
            <h1><span class="rainbow-icon" aria-hidden="true"></span>Task 4 - Fourth Challenge</h1>
            <div class="progress-bar">
                <div class="progress" style="width: 80%;"></div>
            </div>
        </div>
        
        <div class="verification-section">
            <h2>Verification Required</h2>
            <div class="form-group">
                <label for="teamId4">Team ID:</label>
                <input type="text" id="teamId4" style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label for="previousCode4">Previous Task Code:</label>
                <input type="text" id="previousCode4" maxlength="5">
            </div>
            <button onclick="verifyTask4()" id="verifyBtn4">Verify & Continue</button>
        </div>
        
        <div class="clue-section" id="clueSection4" style="display: none;">
            <h2>Welcome Team <span id="teamDisplayName">TEAM</span>!</h2>
            <h2>Your Fourth Clue:</h2>
            <div class="clue-box">
                <p>"स्क्रीन पर जो दिखता है संसार, यहाँ बन जाता है कागज़ी अवतार। स्याही और पन्नों का जहाँ मेल,अगला सुराग बढ़ाएगा खेल।"</p>
            </div>
            
            <div class="task-code-section">
                <h3>Task Code to Remember:</h3>
                <div class="task-code">TC200</div>
                <p class="task-note">Remember this code for the FINAL task!</p>
            </div>
            
            <button onclick="completeTask4()" id="completeBtn4" class="btn-success">Mark Task 4 Complete</button>
        </div>
        
        <div class="navigation">
            <button onclick="goHome()" class="btn-secondary">Home</button>
            <button onclick="goToAdmin()" class="btn-admin">View Results</button>
        </div>
    </div>
    
    <!-- Firebase Scripts -->
    <script src="firebase-script.js?v=2"></script>
    <script>
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        window.onload = async function() {
            if (!(await blockDirectAccess(4))) {
                return;
            }

            const urlTeamId = getURLParameter('team');
            if (urlTeamId) {
                document.getElementById('teamId4').value = urlTeamId.toUpperCase();
            }
            displayTeamInfo();
            loadTaskStatus();
        };
        
        function loadTaskStatus() {
            const teamId = document.getElementById('teamId4').value || firebaseGame.getCurrentTeamId();
            if (!teamId) return;
            
            firebaseGame.getTeamProgress(teamId).then(progress => {
                if (progress && progress.completedTasks >= 4) {
                    // Already completed Task 4
                    document.getElementById('clueSection4').style.display = 'block';
                    document.getElementById('teamDisplayName').textContent = teamId;
                    document.getElementById('completeBtn4').textContent = 'Task 4 Completed!';
                    document.getElementById('completeBtn4').disabled = true;
                    document.getElementById('completeBtn4').style.opacity = '0.7';
                }
            });
        }
        
        function displayTeamInfo() {
            // Compatibility function
        }
    </script>
</body>
</html>
